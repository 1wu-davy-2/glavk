services:
  mariadb:
    image: mariadb:11.8
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${MARIADB_DATABASE:-glavk}
      MARIADB_USER: ${MARIADB_USER:-glavk_user}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:-change-me-db-password}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-change-me-root-password}
    ports:
      - "${MARIADB_PORT:-3307}:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 12

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-production}
      DATABASE_URL: ${DATABASE_URL:-mysql+pymysql://${MARIADB_USER:-glavk_user}:${MARIADB_PASSWORD:-change-me-db-password}@mariadb:3306/${MARIADB_DATABASE:-glavk}?charset=utf8mb4}
      AUTH_SECRET_KEY: ${AUTH_SECRET_KEY:-change-this-secret-key}
      AUTH_TOKEN_TTL_DAYS: ${AUTH_TOKEN_TTL_DAYS:-30}
      CREDENTIAL_ENCRYPTION_KEY: ${CREDENTIAL_ENCRYPTION_KEY:-AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-this-before-start}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:6222,http://127.0.0.1:6222}
    ports:
      - "${BACKEND_PORT:-6555}:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')"]
      interval: 15s
      timeout: 5s
      start_period: 15s
      retries: 5

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-6222}:80"

volumes:
  mariadb_data:
