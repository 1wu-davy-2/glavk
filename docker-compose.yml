services:
  mariadb:
    image: mariadb:11.8
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${MARIADB_DATABASE:-glavk}
      MARIADB_USER: ${MARIADB_USER:-glavk_user}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:-change-me-db-password}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-change-me-root-password}
    ports:
      - "${MARIADB_BIND_ADDRESS:-127.0.0.1}:${MARIADB_PORT:-3307}:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 12

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-production}
      DATABASE_URL: ${DATABASE_URL:-mysql+pymysql://${MARIADB_USER:-glavk_user}:${MARIADB_PASSWORD:-change-me-db-password}@mariadb:3306/${MARIADB_DATABASE:-glavk}?charset=utf8mb4}
      AUTH_SECRET_KEY: ${AUTH_SECRET_KEY:-}
      AUTH_TOKEN_TTL_DAYS: ${AUTH_TOKEN_TTL_DAYS:-30}
      CREDENTIAL_ENCRYPTION_KEY: ${CREDENTIAL_ENCRYPTION_KEY:-}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-change-this-before-start}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://${SERVER_IP:-localhost}:${FRONTEND_PORT:-6222},http://localhost:${FRONTEND_PORT:-6222},http://127.0.0.1:${FRONTEND_PORT:-6222}}
      TRANSPORT_PRIVATE_KEY_B64: ${TRANSPORT_PRIVATE_KEY_B64:-}
      SCREENSHOT_DIR: ${SCREENSHOT_DIR:-/app/data/screenshots}
      SCREENSHOT_ALLOW_PRIVATE_NETWORKS: ${SCREENSHOT_ALLOW_PRIVATE_NETWORKS:-false}
      GLAVK_RUNTIME_SECRETS_FILE: ${GLAVK_RUNTIME_SECRETS_FILE:-/app/data/runtime-secrets.env}
    ports:
      - "${BACKEND_PORT:-6555}:8000"
    volumes:
      - backend_data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health')"]
      interval: 15s
      timeout: 5s
      start_period: 15s
      retries: 5

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://${SERVER_IP:-localhost}:${BACKEND_PORT:-6555}}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-6222}:80"

volumes:
  mariadb_data:
  backend_data:
